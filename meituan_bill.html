<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账单详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f7f7f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333;
        }
        .card {
            background-color: #fff;
            border-radius: 12px;
            margin: 12px;
            padding: 20px;
        }
        .text-secondary {
            color: #999;
        }
        .text-link {
            color: #576b95;
        }
        .text-refund {
            color: #fa5151;
        }
        .divider {
            border-bottom: 1px solid #f0f0f0;
            margin: 15px 0;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #10aeff;
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="flex items-center p-4 bg-white sticky top-0 z-10">
        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
        <span class="text-lg font-medium">账单详情</span>
    </div>

    <!-- Main Content -->
    <div class="pb-8">
        <!-- Top Info Card -->
        <div class="card text-center pt-8">
            <div class="flex justify-center mb-3">
                <div class="w-12 h-12 bg-yellow-400 rounded-full flex items-center justify-center font-bold text-sm">美团</div>
            </div>
            <div class="text-base mb-2">美团</div>
            <div class="text-4xl font-bold mb-2">-41.09</div>
            <div class="text-sm text-refund flex items-center justify-center">
                已退款(￥0.48)
                <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </div>

            <div class="mt-8 text-left space-y-4">
                <div class="flex justify-between items-start">
                    <span class="text-secondary w-24">关联记录</span>
                    <span class="text-link flex-1">查看关联记录</span>
                </div>
                <div class="divider"></div>
                <div class="flex justify-between items-start">
                    <span class="text-secondary w-24">支付时间</span>
                    <span class="flex-1">2026-04-13 19:34:42</span>
                </div>
                <div class="flex justify-between items-start">
                    <span class="text-secondary w-24">付款方式</span>
                    <div class="flex-1 flex items-center">
                        <span>交通银行储蓄卡(3563)</span>
                        <svg class="w-3 h-3 ml-1 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </div>
                </div>
                <div class="flex justify-between items-start">
                    <span class="text-secondary w-24">商品说明</span>
                    <span class="flex-1 break-all leading-tight">美团订单-26041311100300001300263897643747</span>
                </div>
                <div class="flex justify-between items-start">
                    <span class="text-secondary w-24">收款方全称</span>
                    <span class="flex-1">北京三快在线科技有限公司</span>
                </div>
            </div>
            
            <div class="mt-4 text-secondary text-sm flex items-center justify-center">
                更多
                <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </div>
        </div>

        <!-- Bill Management Card -->
        <div class="card space-y-6">
            <div class="text-base font-medium">账单管理</div>
            
            <div class="flex justify-between items-center">
                <span>账单分类</span>
                <svg class="w-4 h-4 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </div>

            <div class="flex justify-between items-center">
                <span>标签</span>
                <svg class="w-4 h-4 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </div>

            <!-- Banner -->
            <div class="bg-gray-50 rounded-lg p-3 flex items-center justify-between">
                <div class="flex items-center">
                    <div class="w-6 h-6 bg-yellow-500 rounded flex items-center justify-center text-white text-xs mr-2">￥</div>
                    <span class="text-sm">开通记账本，自动生成标签统计报告</span>
                </div>
                <svg class="w-4 h-4 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </div>

            <div class="flex justify-between items-center">
                <span>计入收支</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="space-y-1">
                <div class="text-base">备注</div>
                <div class="flex justify-between items-center">
                    <span class="text-secondary text-sm">点击写备注</span>
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="px-4 grid grid-cols-2 gap-y-6 mt-6">
            <div class="flex items-center text-sm">
                <svg class="w-5 h-5 mr-2 text-link" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                </svg>
                <span>联系商家</span>
            </div>
            <div class="flex items-center text-sm">
                <svg class="w-5 h-5 mr-2 text-link" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
                </svg>
                <span>查看往来记录</span>
            </div>
            <div class="flex items-center text-sm">
                <svg class="w-5 h-5 mr-2 text-link" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                </svg>
                <span>AA收款</span>
            </div>
            <div class="flex items-center text-sm">
                <svg class="w-5 h-5 mr-2 text-link" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                <span>往来流水证明</span>
            </div>
        </div>
    </div>
</body>
</html>
